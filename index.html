<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA STORE | Premium</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { animation: { 'fade-in': 'fadeIn 0.5s ease-in-out', 'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --card: #ffffff; --border: #e2e8f0; --glass: rgba(255,255,255,0.9); }
        html.dark { --bg: #050b14; --text: #e2e8f0; --card: #0f172a; --border: #1e293b; --glass: rgba(15,23,42,0.85); }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 80px; transition: background-color 0.3s; }
        @media (min-width: 768px) { body { padding-bottom: 0; } } /* Disable bottom padding on PC */
        
        #splashScreen { position: fixed; inset: 0; background: var(--bg); z-index: 999999; display: flex; justify-content: center; align-items: center; transition: opacity 0.6s ease-out; }
        .spinner { width: 60px; height: 60px; border: 6px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        
        .blob-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .blob { position: absolute; filter: blur(90px); opacity: 0.15; animation: float 20s infinite alternate; }
        .blob-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: #3b82f6; }
        .blob-2 { bottom: -20%; right: -10%; width: 500px; height: 500px; background: #8b5cf6; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }

        .product-card { background: var(--card); border: 1px solid var(--border); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.15); }
        
        /* Mobile-optimized Category Scroll */
        .category-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 8px 16px; border-radius: 50px; font-weight: 900; font-size: 12px; white-space: nowrap; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; transition: 0.3s; }
        .cat-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 5px 15px rgba(59,130,246,0.3); }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; } .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 10px; }
        .variant-select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 8px; font-size: 12px; font-weight: bold; width: 100%; outline:none; }
        
        /* Ticker */
        .ticker-wrap { width: 100%; overflow: hidden; background: linear-gradient(90deg, #0f172a, #1e293b); border-bottom: 1px solid #3b82f6; display: flex; align-items: center; height: 35px; }
        .ticker-title { background: #3b82f6; color: white; font-weight: 900; padding: 0 15px; height: 100%; display: flex; align-items: center; z-index: 10; font-size: 10px; letter-spacing: 1px; }
        .ticker-move { display: inline-block; white-space: nowrap; padding-left: 100%; animation: tickerAnim 20s linear infinite; }
        .ticker-item { margin-right: 40px; font-weight: bold; color: #e2e8f0; font-size: 12px; display: inline-block; }
        @keyframes tickerAnim { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        /* FABs */
        .fab { position: fixed; z-index: 45; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #btnChat { bottom: 90px; right: 15px; background: #10b981; color: white; }
        #btnFeedback { bottom: 90px; left: 15px; background: #4f46e5; color: white; }
        #btnScrollTop { bottom: 145px; right: 15px; background: #3b82f6; color: white; opacity: 0; pointer-events: none; }
        #btnScrollTop.visible { opacity: 1; pointer-events: auto; }
        @media (min-width: 768px) { .fab{width:50px; height:50px;} #btnChat { bottom: 30px; right: 30px; } #btnFeedback { bottom: 30px; left: 30px; } #btnScrollTop { bottom: 90px; right: 30px; } }

        /* Modals & AI Chat */
        #chatWindow { position: fixed; bottom: 150px; right: 15px; width: calc(100% - 30px); max-width: 350px; height: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; z-index: 100000; display: flex; flex-direction: column; transform: scale(0); transform-origin: bottom right; transition: 0.3s; }
        #chatWindow.open { transform: scale(1); }
        @media (min-width: 768px) { #chatWindow { bottom: 90px; right: 30px; width: 350px; } }
        .chat-bubble-user { background: #3b82f6; color: white; padding: 8px 12px; border-radius: 12px 12px 0 12px; max-width: 80%; align-self: flex-end; font-size: 12px; margin-bottom:8px; }
        .chat-bubble-ai { background: var(--bg); border: 1px solid var(--border); padding: 8px 12px; border-radius: 12px 12px 12px 0; max-width: 80%; align-self: flex-start; font-size: 12px; margin-bottom:8px; }
    </style>
</head>
<body class="dark">

    <div id="splashScreen"><div class="spinner"></div></div>
    <div class="blob-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

    <div id="flashBanner" class="hidden bg-gradient-to-r from-red-600 to-rose-500 text-white text-[10px] sm:text-xs font-bold py-1.5 text-center shadow-lg relative z-50">
        <i class="fa-solid fa-bolt animate-pulse text-yellow-300 mr-1"></i> FLASH SALE ENDS IN: <span id="countdownTimer" class="font-mono text-yellow-300 ml-1">00:00:00</span>
    </div>

    <div id="noticeWrapper" class="hidden ticker-wrap">
        <div class="ticker-title"><i class="fa-solid fa-bullhorn animate-pulse mr-1 text-yellow-300"></i> UPDATES</div>
        <div class="ticker-move" id="noticeText"></div>
    </div>

    <nav class="hidden md:flex sticky top-0 z-50 w-full h-20 items-center px-8 shadow-lg transition-colors" style="background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer group" onclick="location.reload()">
                <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.5)] text-white group-hover:rotate-12 transition-transform"><i class="fa-solid fa-shirt text-2xl"></i></div>
                <span class="font-black text-3xl tracking-tighter">AURA<span class="text-blue-500">STORE</span></span>
            </div>
            
            <div class="flex-1 max-w-xl mx-8 relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                <input type="text" id="searchInputPC" onkeyup="applyFilters(this.value)" placeholder="Search premium collections..." class="w-full bg-[var(--card)] border border-[var(--border)] rounded-full pl-12 pr-6 py-2.5 outline-none focus:border-blue-500 font-bold shadow-sm text-[var(--text)]">
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-full flex justify-center items-center bg-[var(--card)] border border-[var(--border)] hover:scale-105 transition-transform"><i id="themeIconPC" class="fa-solid fa-sun text-yellow-400"></i></button>
                <div id="authSectionPC" class="flex items-center gap-3"></div>
            </div>
        </div>
    </nav>

    <header class="md:hidden sticky top-0 z-50 w-full h-16 flex items-center px-4 shadow-md transition-colors" style="background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);">
        <div class="w-full flex justify-between items-center">
            <div class="flex items-center gap-2" onclick="location.reload()">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white"><i class="fa-solid fa-shirt text-sm"></i></div>
                <span class="font-black text-xl tracking-tighter">AURA<span class="text-blue-500">STORE</span></span>
            </div>
            <button onclick="toggleTheme()" class="w-8 h-8 rounded-full flex justify-center items-center bg-[var(--card)] border border-[var(--border)]"><i id="themeIconMob" class="fa-solid fa-sun text-yellow-400 text-xs"></i></button>
        </div>
    </header>

    <button onclick="toggleChat()" id="btnChat" class="fab"><i class="fa-solid fa-robot"></i></button>
    <button onclick="openFeedback()" id="btnFeedback" class="fab"><i class="fa-solid fa-comment-dots"></i></button>
    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="btnScrollTop" class="fab"><i class="fa-solid fa-arrow-up"></i></button>

    <div id="chatWindow">
        <div class="bg-blue-600 p-3 flex justify-between items-center text-white"><div class="flex items-center gap-2"><div class="w-6 h-6 bg-white/20 rounded-full flex items-center justify-center"><i class="fa-solid fa-robot text-xs"></i></div><h3 class="font-black text-xs">AURA Assistant</h3></div><button onclick="toggleChat()"><i class="fa-solid fa-xmark"></i></button></div>
        <div id="chatMessages" class="flex-1 p-3 overflow-y-auto custom-scrollbar flex flex-col bg-[var(--bg)] text-[var(--text)]"><div class="chat-bubble-ai">Assalamu Alaikum! Ami AURA STORE er AI. Kivabe sahajjo korbo? 😊</div></div>
        <div class="p-2 bg-[var(--card)] border-t border-[var(--border)] flex gap-2"><input type="text" id="chatInput" onkeypress="if(event.key==='Enter') sendChatMessage()" placeholder="Type message..." class="flex-1 bg-[var(--bg)] border border-[var(--border)] rounded-full px-3 text-xs text-[var(--text)] outline-none"><button onclick="sendChatMessage()" class="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center"><i class="fa-solid fa-paper-plane text-xs"></i></button></div>
    </div>

    <div class="pt-6 pb-4 px-4 max-w-7xl mx-auto relative z-10">
        
        <div class="md:hidden relative mb-4">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
            <input type="text" id="searchInputMob" onkeyup="applyFilters(this.value)" placeholder="Search products..." class="w-full bg-[var(--card)] border border-[var(--border)] rounded-full pl-12 pr-4 py-3 outline-none focus:border-blue-500 font-bold shadow-sm text-[var(--text)] text-sm">
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="category-scroll w-full md:w-auto" id="categoryContainer">
                <button onclick="setCategory('All', this)" class="cat-btn active">🔥 All</button>
                <button onclick="setCategory('Premium', this)" class="cat-btn">💎 Premium</button>
                <button onclick="setCategory('T-Shirt', this)" class="cat-btn">👕 T-Shirts</button>
                <button onclick="setCategory('Freestyle', this)" class="cat-btn">⚽ Freestyle Gear</button>
            </div>
            
            <div class="flex w-full md:w-auto gap-2 justify-end">
                <select id="sortSelect" onchange="applyFilters()" class="bg-[var(--card)] border border-[var(--border)] text-[var(--text)] px-4 py-2 rounded-full font-bold text-xs outline-none cursor-pointer">
                    <option value="newest">Latest</option>
                    <option value="low">Low Price</option>
                    <option value="high">High Price</option>
                </select>
                <button onclick="toggleWishlistView()" id="wishlistBtnFilter" class="bg-rose-500/10 text-rose-500 border border-rose-500/30 w-9 h-9 rounded-full font-bold text-sm shadow-sm flex items-center justify-center"><i class="fa-solid fa-heart"></i></button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 pb-6 min-h-[40vh] relative z-10" id="product-list">
        <div class="product-card p-3 animate-pulse rounded-2xl"><div class="w-full h-40 bg-slate-300 dark:bg-slate-700 rounded-xl mb-3"></div><div class="w-3/4 h-4 bg-slate-300 dark:bg-slate-700 mb-2 rounded"></div></div>
        <div class="product-card p-3 animate-pulse rounded-2xl"><div class="w-full h-40 bg-slate-300 dark:bg-slate-700 rounded-xl mb-3"></div><div class="w-3/4 h-4 bg-slate-300 dark:bg-slate-700 mb-2 rounded"></div></div>
    </div>

    <div class="md:hidden fixed bottom-0 left-0 w-full bg-[var(--card)] border-t border-[var(--border)] h-[70px] flex justify-around items-center shadow-[0_-10px_20px_rgba(0,0,0,0.2)] pb-2 z-50 transition-colors" id="mobileBottomNav"></div>

    <div id="quickViewModal" class="fixed inset-0 bg-black/80 hidden justify-center items-center p-4 backdrop-blur-md z-[99999]">
        <div class="bg-[var(--card)] w-full max-w-4xl max-h-[90vh] rounded-3xl flex flex-col md:flex-row overflow-hidden relative shadow-[0_0_50px_rgba(0,0,0,0.5)] border border-[var(--border)]">
            <button onclick="closeQuickView()" class="absolute top-3 right-3 w-8 h-8 bg-black/50 text-white rounded-full z-20"><i class="fa-solid fa-xmark"></i></button>
            <div class="w-full md:w-1/2 h-56 md:h-auto bg-slate-900 flex items-center justify-center p-4 relative" id="qvImageArea"></div>
            <div class="w-full md:w-1/2 p-5 md:p-8 flex flex-col justify-between overflow-y-auto custom-scrollbar bg-[var(--bg)] text-[var(--text)]">
                <div id="qvDetailsArea"></div><div id="qvActionArea" class="mt-4 border-t border-[var(--border)] pt-4"></div>
            </div>
        </div>
    </div>

    <div id="cartDrawer" class="fixed inset-y-0 right-0 w-full md:w-[400px] bg-[var(--card)] border-l border-[var(--border)] drawer-closed transition-transform duration-300 flex flex-col shadow-2xl z-[99999]">
        <div class="p-5 border-b border-[var(--border)] flex justify-between items-center bg-[var(--bg)]"><h2 class="text-xl font-black text-[var(--text)]"><i class="fa-solid fa-cart-shopping mr-2 text-blue-500"></i> My Cart</h2><button onclick="toggleCart()" class="w-8 h-8 bg-[var(--card)] border border-[var(--border)] rounded-full text-[var(--text)]"><i class="fa-solid fa-xmark"></i></button></div>
        <div class="flex-1 overflow-y-auto custom-scrollbar p-5 bg-[var(--bg)] text-[var(--text)]">
            <div id="cartItemsContainer" class="space-y-3 mb-5"></div>
            <div id="promoSection" class="hidden mb-5 flex gap-2"><input type="text" id="promoInput" placeholder="Promo Code" class="flex-1 bg-[var(--card)] border border-[var(--border)] rounded-lg px-3 text-sm font-bold text-[var(--text)] outline-none uppercase"><button onclick="applyPromo()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Apply</button></div>
            <div id="addressSection" class="hidden bg-[var(--card)] border border-[var(--border)] p-4 rounded-xl shadow-sm">
                <h3 class="font-black mb-3 text-xs text-blue-500 uppercase">Delivery Info</h3>
                <div class="space-y-2">
                    <input type="text" id="cPhone" placeholder="Mobile" class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-lg px-3 py-2 text-sm font-bold text-[var(--text)] outline-none">
                    <input type="text" id="cStreet" placeholder="Address" class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-lg px-3 py-2 text-sm font-bold text-[var(--text)] outline-none">
                    <div class="flex gap-2"><input type="text" id="cCity" placeholder="City" class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-lg px-3 py-2 text-sm font-bold text-[var(--text)] outline-none"><input type="text" id="cZip" placeholder="ZIP" class="w-20 bg-[var(--bg)] border border-[var(--border)] rounded-lg px-3 py-2 text-sm font-bold text-[var(--text)] outline-none"></div>
                </div>
            </div>
        </div>
        <div class="p-5 border-t border-[var(--border)] bg-[var(--card)]">
            <div class="flex justify-between items-center mb-1 text-xs"><span class="font-bold text-[var(--text)]">Subtotal:</span><span id="cartTotal" class="font-bold text-[var(--text)]">৳0</span></div>
            <div class="flex justify-between items-center mb-1 text-xs"><span class="font-bold text-indigo-500">Discount:</span><span id="cartDiscount" class="font-bold text-indigo-500">- ৳0</span></div>
            <div class="flex justify-between items-center mb-3 pb-3 border-b border-[var(--border)] text-xs"><span class="font-bold text-slate-500">Advance:</span><span id="cartAdvance" class="font-black text-emerald-500">- ৳0</span></div>
            <div class="flex justify-between items-center mb-4"><span class="font-black text-xs uppercase text-[var(--text)]">Due (COD):</span><span id="cartDue" class="text-2xl font-black text-blue-500">৳0</span></div>
            <button onclick="processOrder()" id="btnConfirmOrder" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl uppercase text-sm shadow-md active:scale-95">Confirm Order</button>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black/80 hidden justify-center items-center px-4 backdrop-blur-sm z-[99999]">
        <div class="bg-[var(--card)] w-full max-w-xl max-h-[90vh] flex flex-col relative border border-[var(--border)] shadow-2xl overflow-hidden rounded-3xl">
            <div class="p-5 border-b border-[var(--border)] flex justify-between items-center bg-[var(--bg)]"><h2 class="text-xl font-black text-[var(--text)]"><i class="fa-solid fa-user text-blue-500 mr-2"></i> Account</h2><button onclick="closeProfile()" class="w-8 h-8 bg-[var(--card)] border border-[var(--border)] text-[var(--text)] rounded-full"><i class="fa-solid fa-xmark"></i></button></div>
            <div class="flex border-b border-[var(--border)] bg-[var(--card)] px-5 pt-3 gap-5 overflow-x-auto custom-scrollbar">
                <button onclick="switchProfTab('overview')" id="tab-overview" class="prof-tab active pb-2 font-bold text-xs uppercase text-blue-500 border-b-2 border-blue-500">Profile</button>
                <button onclick="switchProfTab('orders')" id="tab-orders" class="prof-tab text-slate-500 pb-2 font-bold text-xs uppercase border-b-2 border-transparent">Orders</button>
                <button onclick="switchProfTab('funds')" id="tab-funds" class="prof-tab text-slate-500 pb-2 font-bold text-xs uppercase border-b-2 border-transparent">Wallet</button>
            </div>
            <div class="p-5 overflow-y-auto custom-scrollbar flex-1 bg-[var(--bg)] text-[var(--text)]">
                <div id="sec-overview" class="space-y-5 text-center">
                    <div class="relative w-20 h-20 mx-auto"><div class="w-full h-full bg-[var(--card)] border-2 border-[var(--border)] rounded-full flex items-center justify-center text-3xl font-black overflow-hidden" id="pAvatarContainer"></div><div id="vipBadge" class="absolute -bottom-1 -right-1 text-xl drop-shadow-md"></div></div>
                    <div><h3 class="text-2xl font-black" id="pNameContainer"></h3><p class="text-slate-500 font-bold text-xs mt-1" id="pPoints">0 Points</p></div>
                    <div class="bg-[var(--card)] p-4 rounded-xl border border-[var(--border)] flex justify-between items-center text-left shadow-sm"><div><p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Referral Code</p><p class="text-lg font-mono font-black text-emerald-500" id="pRef">---</p></div><div><span class="text-[10px] font-bold text-emerald-600 bg-emerald-500/10 px-2 py-1 rounded">Earn ৳100</span></div></div>
                    <button onclick="window.logout()" class="text-red-500 font-bold text-sm bg-red-500/10 px-4 py-2 rounded-lg w-full">Logout</button>
                </div>
                <div id="sec-orders" class="hidden space-y-3"><div id="pOrdersList"></div></div>
                <div id="sec-funds" class="hidden space-y-3"><div id="pFundsList"></div></div>
            </div>
        </div>
    </div>

    <div id="fundModal" class="fixed inset-0 bg-black/80 hidden justify-center items-center px-4 backdrop-blur-sm z-[99999]">
        <div class="bg-[var(--card)] w-full max-w-sm rounded-3xl shadow-2xl relative overflow-hidden border border-[var(--border)]">
            <div id="fundHeader" class="p-5 flex justify-between items-center text-white bg-[#e2136e]"><h2 class="text-xl font-black"><i id="fundIcon" class="fa-solid fa-paper-plane mr-2"></i> Add Fund</h2><button onclick="closeFund()" class="w-8 h-8 bg-black/20 rounded-full"><i class="fa-solid fa-xmark"></i></button></div>
            <form id="depositForm" class="p-5 space-y-4 bg-[var(--bg)] text-[var(--text)]">
                <div class="grid grid-cols-2 gap-2"><label class="cursor-pointer"><input type="radio" name="method" value="bkash" class="peer sr-only" checked onchange="updateFundUI()"><div class="py-2 text-center border border-[var(--border)] rounded-lg font-black text-slate-500 peer-checked:border-[#e2136e] peer-checked:text-[#e2136e] peer-checked:bg-[#e2136e]/10 text-xs uppercase bg-[var(--card)]">bKash</div></label><label class="cursor-pointer"><input type="radio" name="method" value="nagad" class="peer sr-only" onchange="updateFundUI()"><div class="py-2 text-center border border-[var(--border)] rounded-lg font-black text-slate-500 peer-checked:border-[#f37021] peer-checked:text-[#f37021] peer-checked:bg-[#f37021]/10 text-xs uppercase bg-[var(--card)]">Nagad</div></label></div>
                <input type="number" id="fBdt" required class="w-full bg-[var(--card)] border border-[var(--border)] text-emerald-500 rounded-lg px-4 py-2 font-black text-lg outline-none focus:border-blue-500" placeholder="Amount (৳)">
                <div class="bg-[var(--card)] p-4 rounded-xl border border-[var(--border)]"><p class="text-[10px] font-black text-slate-500 uppercase mb-1">Send To:</p><div onclick="navigator.clipboard.writeText('01846849460'); toast('success', 'Copied!');" class="bg-[var(--bg)] border border-[var(--border)] px-3 py-2 rounded-lg flex justify-between items-center cursor-pointer"><span id="fNumber" class="font-mono text-base font-black">01846849460</span><i class="fa-regular fa-copy text-blue-500"></i></div></div>
                <div class="space-y-2"><input type="text" id="fSender" required class="w-full bg-[var(--card)] border border-[var(--border)] text-[var(--text)] rounded-lg px-4 py-2 text-sm font-bold outline-none" placeholder="Sender Num"><input type="text" id="fTrx" required class="w-full bg-[var(--card)] border border-[var(--border)] text-[var(--text)] rounded-lg px-4 py-2 text-sm font-black uppercase outline-none" placeholder="TrxID"></div>
                <button type="submit" id="fBtn" class="w-full text-white font-black py-3 rounded-lg uppercase text-sm bg-[#e2136e] active:scale-95">Submit</button>
            </form>
        </div>
    </div>

    <script>
        const toast = (icon, title) => Swal.fire({ toast: true, position: 'top-end', icon, title, showConfirmButton: false, timer: 1500, background: 'var(--card)', color: 'var(--text)' });
        const swalDark = { background: 'var(--card)', color: 'var(--text)', backdrop: 'rgba(0,0,0,0.8)' };
        let user = null; try { const s = localStorage.getItem('user'); if(s) user = JSON.parse(s); } catch(e){}
        let allProducts = []; let cart = []; let wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
        let flashSaleActive = false; let flashDiscount = 0; let flashEnd = null;
        let currentCategory = 'All'; let appliedPromo = ''; let promoDiscPercent = 0;

        function applyTheme() { 
            const isLight = localStorage.getItem('theme') === 'light'; 
            if (isLight) { document.documentElement.classList.remove('dark'); document.getElementById('themeIconPC').className = 'fa-solid fa-moon text-slate-700'; document.getElementById('themeIconMob').className = 'fa-solid fa-moon text-slate-700 text-xs'; } 
            else { document.documentElement.classList.add('dark'); document.getElementById('themeIconPC').className = 'fa-solid fa-sun text-yellow-400'; document.getElementById('themeIconMob').className = 'fa-solid fa-sun text-yellow-400 text-xs'; } 
        }
        function toggleTheme() { const isDark = document.documentElement.classList.contains('dark'); localStorage.setItem('theme', isDark ? 'light' : 'dark'); applyTheme(); } applyTheme();

        window.onload = () => { setTimeout(() => { document.getElementById('splashScreen').style.opacity = '0'; setTimeout(()=>document.getElementById('splashScreen').style.display='none',600); }, 800); };
        window.addEventListener('scroll', () => { const btn = document.getElementById('btnScrollTop'); if(btn) { if (window.scrollY > 300) btn.classList.add('visible'); else btn.classList.remove('visible'); } });

        async function init() { renderAuth(); loadNotices(); loadFlashSale(); if(user && user.id) { try { const res = await fetch('/api/user/' + user.id); const data = await res.json(); if(data.success) { user = {...user, ...data}; localStorage.setItem('user', JSON.stringify(user)); renderAuth(); } } catch(e) {} } loadProducts(); }

        async function loadNotices() { try { const res = await fetch('/api/notices'); const notices = await res.json(); if(notices && notices.length > 0) { document.getElementById('noticeText').innerHTML = notices.map(n => `<span class="ticker-item"><span>•</span>${n.text}</span>`).join(''); document.getElementById('noticeWrapper').classList.remove('hidden'); } } catch(e) {} }
        async function loadFlashSale() { try { const res = await fetch('/api/flashsale'); const data = await res.json(); if(data.isActive && new Date(data.endTime) > new Date()) { flashSaleActive = true; flashDiscount = data.discountPercent; flashEnd = new Date(data.endTime); document.getElementById('flashBanner').classList.remove('hidden'); setInterval(() => { let diff = flashEnd - new Date(); if(diff <= 0) { flashSaleActive = false; document.getElementById('flashBanner').classList.add('hidden'); applyFilters(); return; } let h = Math.floor(diff / (1000 * 60 * 60)); let m = Math.floor((diff / 1000 / 60) % 60); let s = Math.floor((diff / 1000) % 60); document.getElementById('countdownTimer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }, 1000); } } catch(e) {} }

        function getBadge(role) { return role === 'ADMIN' ? '<span class="text-[8px] bg-red-600 text-white px-1.5 py-0.5 rounded ml-1 font-bold">ADMIN</span>' : ''; }
        function getVipBadge(points) { if(points >= 1000) return '💎'; if(points >= 500) return '🥇'; if(points >= 100) return '🥈'; return '🥉'; }

        function renderAuth() {
            const authPC = document.getElementById('authSectionPC'); const mobNav = document.getElementById('mobileBottomNav');
            if(user) {
                const uName = user.name || user.firstName || 'User'; let avHtml = user.avatar ? `<img src="${user.avatar}" class="w-full h-full object-cover">` : `<span class="text-sm font-black">${uName.charAt(0).toUpperCase()}</span>`; let displayBal = `৳${parseFloat(user.balanceBdt).toFixed(0)}`;
                
                // PC Nav Layout
                if(authPC) authPC.innerHTML = `<button onclick="openFund()" class="bg-emerald-500/10 text-emerald-500 border border-emerald-500/30 px-4 py-2 rounded-full font-bold text-xs hover:bg-emerald-500 hover:text-white transition-colors">Fund</button><div class="flex items-center bg-[var(--card)] border border-[var(--border)] px-4 py-1.5 rounded-full font-black text-sm"><span class="mr-2 pr-2 border-r border-[var(--border)] flex items-center">${uName}</span><span class="text-emerald-500">${displayBal}</span></div><button onclick="toggleCart()" class="w-10 h-10 bg-blue-600 rounded-full flex justify-center items-center text-white relative hover:scale-105 transition-transform"><i class="fa-solid fa-cart-shopping"></i><span id="cartCountDesk" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold hidden">0</span></button><button onclick="openProfileDashboard('overview')" class="w-10 h-10 bg-[var(--card)] border border-[var(--border)] rounded-full flex justify-center items-center overflow-hidden hover:opacity-80">${avHtml}</button>`;
                
                // Mobile Nav Layout
                if(mobNav) mobNav.innerHTML = `<button onclick="location.reload()" class="text-blue-500 flex flex-col items-center pt-2"><i class="fa-solid fa-store text-lg mb-1"></i><span class="text-[9px] font-bold">Store</span></button><button onclick="toggleCart()" class="text-slate-400 flex flex-col items-center relative pt-2"><i class="fa-solid fa-cart-shopping text-lg mb-1"></i><span id="cartCountMob" class="absolute top-1 right-1 bg-red-500 text-white text-[8px] w-3 h-3 rounded-full flex items-center justify-center font-bold hidden">0</span><span class="text-[9px] font-bold">Cart</span></button><button onclick="openFund()" class="text-emerald-500 flex flex-col items-center pt-2"><i class="fa-solid fa-wallet text-lg mb-1"></i><span class="text-[9px] font-bold">${displayBal}</span></button><button onclick="openProfileDashboard('overview')" class="text-slate-400 flex flex-col items-center pt-2"><div class="w-5 h-5 rounded-full overflow-hidden border border-[var(--border)] flex justify-center items-center mb-1">${avHtml}</div><span class="text-[9px] font-bold">Profile</span></button>`;
            } else {
                if(authPC) authPC.innerHTML = `<button onclick="location.href='/login'" class="bg-blue-600 text-white px-6 py-2.5 rounded-full font-black text-xs uppercase tracking-widest hover:bg-blue-500 transition-colors">Login</button>`;
                if(mobNav) mobNav.innerHTML = `<button onclick="location.href='/login'" class="w-[90%] bg-blue-600 text-white py-3 rounded-xl font-black uppercase text-xs">Login / Register</button>`;
            }
            updateCartBadge();
        }

        async function loadProducts() { 
            try { const res = await fetch('/api/products'); const data = await res.json(); if(Array.isArray(data)) { allProducts = data; applyFilters(); } } 
            catch(e) { document.getElementById('product-list').innerHTML = '<div class="col-span-full text-center text-red-500 font-bold py-10"><i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i><br>Database connection error.</div>'; } 
        }

        function setCategory(cat, btn) { currentCategory = cat; document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); applyFilters(); }
        function toggleWishlistView() { showOnlyWishlist = !showOnlyWishlist; const btn = document.getElementById('wishlistBtnFilter'); if(showOnlyWishlist) { btn.classList.add('bg-rose-500', 'text-white'); } else { btn.classList.remove('bg-rose-500', 'text-white'); } applyFilters(); }
        
        function applyFilters(searchTerm = null) {
            let list = allProducts;
            if(showOnlyWishlist) list = list.filter(p => wishlist.includes(p.id));
            if(currentCategory !== 'All') list = list.filter(p => p.category && p.category.toLowerCase() === currentCategory.toLowerCase());
            
            // Handle both PC and Mob search inputs
            let q = searchTerm;
            if(q === null) {
                const qPC = document.getElementById('searchInputPC') ? document.getElementById('searchInputPC').value.toLowerCase() : '';
                const qMob = document.getElementById('searchInputMob') ? document.getElementById('searchInputMob').value.toLowerCase() : '';
                q = qPC || qMob;
            } else { q = q.toLowerCase(); }

            if(q) list = list.filter(p => p.name.toLowerCase().includes(q) || p.abilities.toLowerCase().includes(q));
            
            const sortMethod = document.getElementById('sortSelect').value;
            if(sortMethod === 'low') list.sort((a,b) => a.price - b.price);
            else if(sortMethod === 'high') list.sort((a,b) => b.price - a.price);
            
            renderProducts(list);
        }

        function toggleWishlist(id) { if(wishlist.includes(id)) { wishlist = wishlist.filter(w=>w!==id); toast('info','Removed from Wishlist'); } else { wishlist.push(id); toast('success','Added to Wishlist ❤️'); } localStorage.setItem('wishlist', JSON.stringify(wishlist)); applyFilters(); }

        function openQuickView(id) {
            const p = allProducts.find(x=>x.id===id); if(!p) return;
            const img = (p.imageIds && p.imageIds.length>0) ? `/api/photo/${p.imageIds[0]}` : 'https://placehold.co/400x400';
            document.getElementById('qvImageArea').innerHTML = `<img src="${img}" class="max-w-full max-h-full object-contain rounded-xl drop-shadow-2xl">`;
            let sizeOpts = p.sizes && p.sizes.length > 0 ? `<select id="qv-sz" class="variant-select"><option value="">Select Size</option>${p.sizes.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>` : '';
            let colorOpts = p.colors && p.colors.length > 0 ? `<select id="qv-cl" class="variant-select mt-2"><option value="">Select Color</option>${p.colors.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>` : '';
            
            let finalPrice = p.price; let priceHtml = `<p class="text-emerald-500 font-black text-2xl mb-3">৳${p.price}</p>`;
            if(flashSaleActive) { finalPrice = p.price - (p.price * flashDiscount / 100); priceHtml = `<div class="mb-3"><p class="text-emerald-500 font-black text-2xl inline-block mr-2">৳${finalPrice}</p><del class="text-slate-500 text-sm font-bold">৳${p.price}</del></div>`; }
            
            let stockAlert = p.stock <= 5 && p.stock > 0 ? `<p class="text-[9px] text-red-500 font-bold mt-2 animate-pulse"><i class="fa-solid fa-fire"></i> Only ${p.stock} left in stock</p>` : `<p class="text-[10px] font-bold text-blue-500 bg-blue-500/10 px-2 py-1 rounded mt-2 inline-block"><i class="fa-solid fa-box mr-1"></i> Stock: ${p.stock}</p>`;

            document.getElementById('qvDetailsArea').innerHTML = `<p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-1">${p.category||'Premium'}</p><h2 class="text-2xl font-black mb-1 leading-tight text-[var(--text)]">${p.name}</h2>${priceHtml}<p class="text-xs text-slate-500 mb-4 leading-relaxed">${p.abilities}</p><div class="mb-2">${sizeOpts}${colorOpts}</div>${stockAlert}`;
            document.getElementById('qvActionArea').innerHTML = p.stock<=0 ? `<button disabled class="w-full bg-red-500/10 text-red-500 py-3 rounded-xl font-black uppercase text-sm">Out of Stock</button>` : `<button onclick="addToCartQV(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${finalPrice})" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black uppercase text-sm active:scale-95"><i class="fa-solid fa-cart-plus mr-2"></i> Add to Cart</button>`;
            
            const modal = document.getElementById('quickViewModal'); if(modal) { modal.classList.remove('hidden'); modal.style.display = 'flex'; }
        }
        function closeQuickView() { const modal = document.getElementById('quickViewModal'); if(modal) { modal.classList.add('hidden'); modal.style.display = 'none'; } }
        function addToCartQV(id, name, price) { let sEl = document.getElementById(`qv-sz`); let cEl = document.getElementById(`qv-cl`); let size = sEl ? sEl.value : null; let color = cEl ? cEl.value : null; if(sEl && !size) return toast('warning', 'Select Size!'); if(cEl && !color) return toast('warning', 'Select Color!'); addToCartDirect(id, name, price, size, color); closeQuickView(); }

        function shareProduct(id, name) { if (navigator.share) { navigator.share({ title: name, url: window.location.href }); } else { navigator.clipboard.writeText(window.location.href); toast('success', 'Copied!'); } }

        function renderProducts(list) {
            const container = document.getElementById('product-list');
            if(list.length === 0) return container.innerHTML = '<div class="col-span-full text-center text-slate-500 font-bold py-10"><i class="fa-solid fa-box-open text-4xl mb-3 opacity-50"></i><br>No items found.</div>';
            
            container.innerHTML = list.map((p, index) => {
                let finalPrice = p.price; let priceHtml = `<div class="flex justify-between items-center mb-2"><p class="text-lg font-black text-emerald-500">৳${p.price}</p><span class="text-yellow-500 text-[9px] font-black bg-yellow-500/10 px-1.5 py-0.5 rounded"><i class="fa-solid fa-star"></i> 5.0</span></div>`;
                let flashBadge = ''; 
                if(flashSaleActive) { finalPrice = p.price - (p.price * flashDiscount / 100); priceHtml = `<div class="flex justify-between items-end mb-2"><div><p class="text-lg font-black text-emerald-500 leading-none">৳${finalPrice}</p><del class="text-[9px] text-slate-500 font-bold">৳${p.price}</del></div><span class="text-yellow-500 text-[9px] font-black bg-yellow-500/10 px-1.5 py-0.5 rounded"><i class="fa-solid fa-star"></i> 5.0</span></div>`; flashBadge = `<div class="absolute top-2 right-2 bg-red-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded shadow-sm z-10 animate-pulse">-${flashDiscount}%</div>`; }
                
                let btnHtml = p.stock <= 0 ? `<button disabled class="w-full bg-red-500/10 text-red-500 py-2.5 rounded-lg font-black uppercase text-[10px]">Sold Out</button>` : `<div class="flex gap-2"><button onclick="addToCartUI(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${finalPrice})" class="flex-1 bg-[var(--bg)] border border-[var(--border)] text-blue-500 py-2.5 rounded-lg active:scale-95"><i class="fa-solid fa-cart-plus text-sm"></i></button><button onclick="buyNowUI(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${finalPrice})" class="flex-[2] bg-blue-600 text-white py-2.5 rounded-lg font-black uppercase text-[10px] shadow-sm active:scale-95"><i class="fa-solid fa-bolt mr-1"></i> Buy</button></div>`;
                let imgHtml = (p.imageIds && p.imageIds.length > 0) ? `<img src="/api/photo/${p.imageIds[0]}" onclick="openQuickView(${p.id})" class="w-full h-full object-cover cursor-pointer hover:scale-105 transition-transform">` : `<div class="w-full h-full flex justify-center items-center"><i class="fa-solid fa-box text-3xl text-slate-400"></i></div>`;
                let wClass = wishlist.includes(p.id) ? "text-rose-500 bg-rose-500/10 border-rose-500/30" : "text-slate-400 bg-[var(--card)] border-[var(--border)]";
                let alertHtml = p.stock <= 5 && p.stock > 0 ? `<p class="absolute bottom-2 left-2 bg-red-500 text-white text-[8px] font-bold px-1.5 py-0.5 rounded shadow z-10 animate-pulse">Only ${p.stock} left</p>` : '';

                return `
                <div class="product-card p-3 flex flex-col justify-between relative group rounded-2xl animate-slide-up shadow-sm" style="animation-delay: ${(index * 0.05)>0.5?0.5:(index * 0.05)}s; opacity: 0;">
                    ${flashBadge}
                    <div class="absolute top-16 right-5 z-10 flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity md:flex">
                        <button onclick="toggleWishlist(${p.id})" class="w-7 h-7 rounded-full flex justify-center items-center shadow-sm border transition-colors ${wClass}"><i class="fa-solid fa-heart text-[10px]"></i></button>
                    </div>
                    <div>
                        <div class="w-full h-40 bg-[var(--bg)] rounded-xl mb-3 overflow-hidden relative shadow-inner">
                            ${imgHtml} ${alertHtml}
                        </div>
                        <p class="text-[8px] font-black text-blue-500 uppercase tracking-widest mb-0.5">${p.category||'Premium'}</p>
                        <h3 class="text-sm font-black mb-1 leading-tight text-[var(--text)] line-clamp-2 cursor-pointer" onclick="openQuickView(${p.id})">${p.name}</h3>
                        ${priceHtml}
                    </div>
                    ${btnHtml}
                </div>`;
            }).join('');
        }

        function toggleCart() { document.getElementById('cartDrawer').classList.toggle('drawer-closed'); if(cart.length > 0 && user && user.savedAddress) { try { const addr = JSON.parse(user.savedAddress); if(document.getElementById('cPhone').value==='') { document.getElementById('cPhone').value = addr.phone||''; document.getElementById('cStreet').value = addr.street||''; document.getElementById('cCity').value = addr.city||''; document.getElementById('cZip').value = addr.postcode||''; } } catch(e){} } }
        function updateCartBadge() { const cDesk = document.getElementById('cartCountDesk'); const cMob = document.getElementById('cartCountMob'); if(cart.length > 0) { if(cDesk) {cDesk.innerText = cart.length; cDesk.classList.remove('hidden');} if(cMob) {cMob.innerText = cart.length; cMob.classList.remove('hidden');} } else { if(cDesk) cDesk.classList.add('hidden'); if(cMob) cMob.classList.add('hidden'); } }

        function addToCartUI(id, name, price) { openQuickView(id); }
        function buyNowUI(id, name, price) { if(!user) return location.href='/login'; openQuickView(id); setTimeout(()=>document.getElementById('qvActionArea').scrollIntoView({behavior:'smooth'}), 200); }
        function addToCartDirect(id, name, price, size, color) { const pInfo = allProducts.find(x=>x.id===id); let img = (pInfo && pInfo.imageIds && pInfo.imageIds.length>0) ? pInfo.imageIds[0] : null; cart.push({ cartId: Date.now(), id, name, price: parseFloat(price), size, color, img }); renderCart(); updateCartBadge(); document.getElementById('promoSection').classList.remove('hidden'); toast('success', 'Added 🛒'); }
        function removeFromCart(cartId) { cart = cart.filter(i => i.cartId !== cartId); renderCart(); updateCartBadge(); if(cart.length === 0) { document.getElementById('addressSection').classList.add('hidden'); document.getElementById('promoSection').classList.add('hidden'); appliedPromo=''; promoDiscPercent=0; } }
        
        async function applyPromo() { const code = document.getElementById('promoInput').value.trim().toUpperCase(); if(!code) return; const res = await fetch('/api/promo/validate', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({code}) }); const data = await res.json(); if(data.success) { appliedPromo = code; promoDiscPercent = data.discount; toast('success', `${data.discount}% Applied!`); renderCart(); } else { toast('error', 'Invalid Code'); } }

        function renderCart() {
            const container = document.getElementById('cartItemsContainer');
            if(cart.length === 0) { container.innerHTML = '<div class="text-center text-slate-500 py-10"><i class="fa-solid fa-cart-arrow-down text-3xl mb-2 opacity-30"></i><br><p class="text-xs">Cart is empty</p></div>'; document.getElementById('cartTotal').innerText = '৳0'; document.getElementById('cartDue').innerText = '৳0'; document.getElementById('cartAdvance').innerText = '- ৳0'; document.getElementById('cartDiscount').innerText = '- ৳0'; return; }
            document.getElementById('addressSection').classList.remove('hidden'); 
            let sum = 0; 
            container.innerHTML = cart.map(i => { sum += i.price; let imgHtml = i.img ? `<img src="/api/photo/${i.img}" class="w-10 h-10 object-cover rounded-lg border border-[var(--border)]">` : `<div class="w-10 h-10 bg-[var(--bg)] rounded-lg flex items-center justify-center"><i class="fa-solid fa-box text-xs"></i></div>`; let variants = []; if(i.size) variants.push(i.size); if(i.color) variants.push(i.color); let varHtml = variants.length > 0 ? `<p class="text-[9px] text-blue-500 bg-blue-500/10 px-1 rounded inline-block mt-0.5">${variants.join(', ')}</p>` : ''; return `<div class="bg-[var(--card)] p-3 rounded-xl flex justify-between items-center border border-[var(--border)] shadow-sm"><div class="flex items-center gap-3">${imgHtml}<div><p class="font-bold text-xs leading-tight">${i.name}</p>${varHtml}<p class="text-emerald-500 font-black mt-0.5 text-xs">৳${i.price}</p></div></div><button onclick="removeFromCart(${i.cartId})" class="text-red-500 bg-red-500/10 p-2 rounded-lg active:scale-95"><i class="fa-solid fa-trash text-[10px]"></i></button></div>`; }).join('');
            
            let discountAmt = (sum * promoDiscPercent) / 100; let finalSum = sum - discountAmt;
            document.getElementById('cartTotal').innerText = `৳${sum}`; document.getElementById('cartDiscount').innerText = `- ৳${discountAmt.toFixed(0)}`; 
            let advance = finalSum > 0 ? 200 : 0; if(finalSum < 200) advance = finalSum; let due = finalSum - advance; 
            document.getElementById('cartAdvance').innerText = `- ৳${advance.toFixed(0)}`; document.getElementById('cartDue').innerText = `৳${due.toFixed(0)}`;
        }
        
        async function processOrder() {
            if(cart.length === 0) return; if(!user) return location.href='/login';
            const phone = document.getElementById('cPhone').value; const street = document.getElementById('cStreet').value; const city = document.getElementById('cCity').value; const zip = document.getElementById('cZip').value;
            if(!phone || !street || !city) return Swal.fire('Error', 'Fill delivery info', 'error');
            Swal.fire({title: 'Processing...', didOpen: ()=>Swal.showLoading(), allowOutsideClick: false, background:'var(--card)', color:'var(--text)'});
            try {
                const res = await fetch('/api/checkout', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({userId: user.id, cartItems: cart, address: { phone, street, city, postcode: zip }, promoCode: appliedPromo }) });
                const data = await res.json();
                if(data.success) {
                    user.balanceBdt = data.newBalance; localStorage.setItem('user', JSON.stringify(user)); cart = []; appliedPromo=''; promoDiscPercent=0; updateCartBadge(); toggleCart(); renderAuth(); loadProducts(); document.getElementById('addressSection').classList.add('hidden'); document.getElementById('promoSection').classList.add('hidden');
                    Swal.fire({ title: 'Order Sent! 🎉', html: `<p class="mb-2 text-sm">Advance Paid: <b>৳${data.advance}</b></p><p class="text-lg font-black text-emerald-500">Due (COD): ৳${data.due}</p>`, icon: 'success', confirmButtonColor: '#10b981', background:'var(--card)', color:'var(--text)' }).then((r) => { if(r.isConfirmed) openProfileDashboard('orders'); });
                } else Swal.fire({title:'Failed', text: data.error, icon:'error', background:'var(--card)', color:'var(--text)'});
            } catch(e) { Swal.fire('Error', 'Network Error', 'error'); }
        }

        function downloadInvoice(orderId, prodName, price, advance, due, date) {
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`<html><head><title>Invoice #${orderId}</title><style>body{font-family:Arial,sans-serif;padding:20px;color:#1e293b;} .box{border:1px solid #cbd5e1;padding:20px;border-radius:10px;max-width:400px;margin:0 auto;} h1{color:#2563eb;margin-bottom:0;} p{margin:5px 0;line-height:1.5;font-size:14px;} .amount{font-size:16px;font-weight:bold;color:#ef4444;}</style></head><body><div class="box"><h1>AURA STORE</h1><p style="color:#64748b;font-size:10px;">Payment Memo</p><hr style="margin:15px 0;border-color:#e2e8f0;"><p><strong>Order ID:</strong> #${orderId}</p><p><strong>Date:</strong> ${date}</p><p><strong>Product:</strong> ${prodName}</p><hr style="margin:15px 0;border-color:#e2e8f0;"><p>Total: ৳${price}</p><p>Advance: ৳${advance}</p><p class="amount">Due (COD): ৳${due}</p></div><script>window.print(); setTimeout(()=>window.close(), 500);<\/script></body></html>`); printWindow.document.close();
        }

        function openProfileDashboard(defaultTab = 'overview') {
            try {
                if(!user) return location.href='/login';
                const uName = user.name || user.firstName || 'User'; base64Avatar = user.avatar || '';
                const avContainer = document.getElementById('pAvatarContainer'); if(avContainer) avContainer.innerHTML = base64Avatar ? `<img src="${base64Avatar}" class="w-full h-full object-cover">` : `<span class="text-3xl font-black">${uName.charAt(0).toUpperCase()}</span>`;
                const pts = user.loyaltyPoints || 0; document.getElementById('pPoints').innerText = `${pts} Points`; document.getElementById('vipBadge').innerText = getVipBadge(pts);
                document.getElementById('pNameContainer').innerHTML = `${uName} ${getBadge(user.role)}`; document.getElementById('pRef').innerText = user.refCode || '---';
                document.getElementById('profileModal').style.display = 'flex'; switchProfTab(defaultTab);
                
                fetch('/api/library/' + user.id).then(r=>r.json()).then(data => { 
                    const pList = document.getElementById('pOrdersList');
                    if(pList) { pList.innerHTML = (!Array.isArray(data) || data.length === 0) ? '<p class="text-center text-slate-500 py-10">No orders yet.</p>' : data.map(p => { let varStr = (p.selectedSize || p.selectedColor) ? `[${p.selectedSize||''} ${p.selectedColor||''}]` : ''; let tlStep = 1; if(p.status==='RECEIVED') tlStep=2; else if(p.status==='SHIPPED') tlStep=3; else if(p.status==='DELIVERED') tlStep=4; let timeline = `<div class="flex items-center justify-between w-full mt-4 px-1"><div class="flex flex-col items-center"><div class="timeline-step ${tlStep>=1?'t-active':'t-inactive'}"><i class="fa-solid fa-clipboard-list text-[10px]"></i></div><span class="text-[8px] mt-1 font-bold ${tlStep>=1?'text-emerald-500':'text-slate-500'}">PENDING</span></div><div class="t-line ${tlStep>=2?'active':''}"></div><div class="flex flex-col items-center"><div class="timeline-step ${tlStep>=2?'t-active':'t-inactive'}"><i class="fa-solid fa-box-open text-[10px]"></i></div><span class="text-[8px] mt-1 font-bold ${tlStep>=2?'text-emerald-500':'text-slate-500'}">RECEIVED</span></div><div class="t-line ${tlStep>=3?'active':''}"></div><div class="flex flex-col items-center"><div class="timeline-step ${tlStep>=3?'t-active':'t-inactive'}"><i class="fa-solid fa-truck-fast text-[10px]"></i></div><span class="text-[8px] mt-1 font-bold ${tlStep>=3?'text-emerald-500':'text-slate-500'}">SHIPPED</span></div><div class="t-line ${tlStep>=4?'active':''}"></div><div class="flex flex-col items-center"><div class="timeline-step ${tlStep>=4?'t-active':'t-inactive'}"><i class="fa-solid fa-check text-[10px]"></i></div><span class="text-[8px] mt-1 font-bold ${tlStep>=4?'text-emerald-500':'text-slate-500'}">DONE</span></div></div>`; return `<div class="bg-[var(--card)] border border-[var(--border)] p-4 rounded-2xl mb-3 shadow-sm"><div class="flex justify-between items-start mb-2"><div><h4 class="font-black text-sm text-[var(--text)] line-clamp-1">${p.product.name} <span class="text-blue-500 text-[9px] ml-1 bg-blue-500/10 px-1 rounded">${varStr}</span></h4><p class="text-[9px] text-slate-500 mt-0.5">ID: #${p.id} • ${new Date(p.createdAt).toLocaleDateString()}</p></div><button onclick="downloadInvoice(${p.id}, '${p.product.name.replace(/'/g, "\\'")}', ${p.priceTotal}, ${p.advancePaid}, ${p.dueCod}, '${new Date(p.createdAt).toLocaleDateString()}')" class="text-[10px] bg-indigo-500/10 text-indigo-500 font-bold px-2 py-1.5 rounded hover:bg-indigo-500 hover:text-white shrink-0 ml-2"><i class="fa-solid fa-download"></i></button></div>${timeline}</div>`; }).join(''); }
                }).catch(()=>{});
                
                fetch('/api/history/' + user.id).then(r=>r.json()).then(data => { const pFunds = document.getElementById('pFundsList'); if(pFunds) { pFunds.innerHTML = (!Array.isArray(data) || data.length === 0) ? '<p class="text-center text-slate-500 py-10">No transactions.</p>' : data.map(d => { let color = d.status === 'APPROVED' ? 'emerald' : d.status === 'REJECTED' ? 'red' : 'yellow'; return `<div class="bg-[var(--card)] p-3 rounded-xl flex justify-between items-center border border-[var(--border)] mb-2 shadow-sm"><div><p class="font-black text-xs uppercase text-[var(--text)]">${d.method} <span class="text-blue-500 ml-1">৳${d.amountBdt}</span></p><p class="text-[9px] text-slate-500 font-mono mt-0.5">${d.trxId}</p></div><span class="bg-${color}-500/10 text-${color}-500 px-2 py-1 rounded text-[9px] font-black uppercase">${d.status}</span></div>`; }).join(''); } }).catch(()=>{});
            } catch(error) {}
        }
        function closeProfile() { document.getElementById('profileModal').style.display = 'none'; }
        function switchProfTab(tab) { document.querySelectorAll('.prof-tab').forEach(b => { b.classList.remove('active', 'text-blue-500', 'border-blue-500'); b.classList.add('text-slate-500', 'border-transparent'); }); const aT = document.getElementById('tab-'+tab); if(aT) { aT.classList.add('active', 'text-blue-500', 'border-blue-500'); aT.classList.remove('text-slate-500', 'border-transparent'); } ['overview', 'orders', 'funds'].forEach(t => { const el = document.getElementById('sec-'+t); if(el) el.classList.add('hidden'); }); const view = document.getElementById('sec-'+tab); if(view) view.classList.remove('hidden'); }

        async function sendChatMessage() { const inputEl = document.getElementById('chatInput'); const msg = inputEl.value.trim(); if (!msg) return; const mDiv = document.getElementById('chatMessages'); mDiv.innerHTML += `<div class="chat-bubble-user animate-slide-up">${msg}</div>`; inputEl.value = ''; mDiv.scrollTop = mDiv.scrollHeight; const typing = document.createElement('div'); typing.className = 'chat-bubble-ai'; typing.innerHTML = '...'; mDiv.appendChild(typing); mDiv.scrollTop = mDiv.scrollHeight; try { const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) }); const data = await res.json(); mDiv.removeChild(typing); mDiv.innerHTML += `<div class="chat-bubble-ai animate-slide-up">${data.reply.replace(/\n/g, '<br>')}</div>`; mDiv.scrollTop = mDiv.scrollHeight; } catch(e) { mDiv.removeChild(typing); mDiv.innerHTML += `<div class="chat-bubble-ai text-red-500">Error connection.</div>`; } }
        function toggleChat() { const cb = document.getElementById('chatWindow'); if (cb.classList.contains('open')) { cb.classList.remove('open'); } else { cb.classList.add('open'); document.getElementById('chatInput').focus(); } }

        function openContact() { Swal.fire({ title: 'Contact Support', html: `<div class="flex justify-center gap-4"><a href="https://t.me/minato_namikaze143" target="_blank" class="w-12 h-12 bg-[#25a3e1]/10 text-[#25a3e1] rounded-xl flex items-center justify-center text-2xl"><i class="fa-brands fa-telegram"></i></a><a href="https://www.facebook.com/yours.ononto" target="_blank" class="w-12 h-12 bg-[#1877f2]/10 text-[#1877f2] rounded-xl flex items-center justify-center text-2xl"><i class="fa-brands fa-facebook-f"></i></a></div>`, showConfirmButton: false, showCloseButton: true, ...swalDark }); }
        
        function openFund() { if(!user) return location.href='/login'; const fModal = document.getElementById('fundModal'); if(fModal){ fModal.style.display = 'flex'; document.getElementById('fBdt').value = ''; } }
        function closeFund() { document.getElementById('fundModal').style.display = 'none'; }
        document.getElementById('depositForm').addEventListener('submit', async (e) => { e.preventDefault(); const method = document.querySelector('input[name="method"]:checked').value; const amountBdt = parseFloat(document.getElementById('fBdt').value); const senderNumber = document.getElementById('fSender').value; const trxId = document.getElementById('fTrx').value; if(amountBdt <= 0) return; const btn = document.getElementById('fBtn'); btn.innerHTML = '...'; try { const res = await fetch('/api/deposit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId: user.id, method, amountBdt, senderNumber, trxId }) }); if((await res.json()).success) { closeFund(); Swal.fire({title:'Sent!', icon:'success', background:'var(--card)', color:'var(--text)'}).then(() => openProfileDashboard('funds')); document.getElementById('depositForm').reset(); } } catch(e) {} btn.innerHTML = 'Submit'; });

        window.logout = function() { localStorage.removeItem('user'); localStorage.removeItem('wishlist'); document.body.style.opacity=0; setTimeout(()=>location.href='/login', 300); }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
