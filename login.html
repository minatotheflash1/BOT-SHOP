<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Authentication | AURA STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050b14; color: #e2e8f0; overflow: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s; }
        .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); background: rgba(15,23,42,0.9); outline: none; }
        
        .blob { position: absolute; filter: blur(100px); opacity: 0.2; animation: float 20s infinite alternate; pointer-events: none; z-index: -1; }
        .blob-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: #3b82f6; }
        .blob-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: #8b5cf6; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }

        .tab-btn { color: #64748b; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center relative">
    <div class="blob blob-1"></div><div class="blob blob-2"></div>

    <div class="w-full h-full md:h-auto md:w-[900px] flex flex-col md:flex-row glass-panel md:rounded-[40px] shadow-2xl overflow-hidden relative z-10 animate-slide-up">
        
        <div class="hidden md:flex md:w-1/2 bg-blue-600 p-12 flex-col justify-center items-center text-center relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-blue-500 to-indigo-700 opacity-90 z-0"></div>
            <i class="fa-solid fa-shirt text-8xl text-white mb-6 relative z-10 drop-shadow-lg"></i>
            <h1 class="text-5xl font-black text-white mb-4 relative z-10 tracking-tight">AURA<br>STORE</h1>
            <p class="text-blue-100 font-bold relative z-10">Premium Collections & Freestyle Gear.</p>
            <div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-black/20 to-transparent z-0"></div>
        </div>

        <div class="w-full md:w-1/2 p-8 sm:p-12 h-full flex flex-col justify-center bg-[#0b1120] md:bg-transparent overflow-y-auto">
            
            <div class="md:hidden text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center text-2xl text-white mb-4 shadow-[0_0_20px_rgba(59,130,246,0.5)]"><i class="fa-solid fa-shirt"></i></div>
                <h1 class="text-3xl font-black text-white tracking-tight">AURA STORE</h1>
            </div>

            <div class="flex mb-8 border-b border-slate-800">
                <button id="tabLogin" onclick="switchTab('login')" class="tab-btn active w-1/2 pb-4 font-black uppercase tracking-widest text-sm">Login</button>
                <button id="tabReg" onclick="switchTab('register')" class="tab-btn w-1/2 pb-4 font-black uppercase tracking-widest text-sm">Register</button>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5 animate-slide-up">
                <input type="email" id="lEmail" required placeholder="Email Address" class="w-full input-field px-5 py-4 rounded-xl font-bold">
                <input type="password" id="lPass" required placeholder="Password" class="w-full input-field px-5 py-4 rounded-xl font-bold">
                <button type="submit" id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-[0_0_20px_rgba(59,130,246,0.4)] transition-all active:scale-95 mt-4">Sign In</button>
            </form>

            <form id="regForm" onsubmit="handleRegister(event)" class="hidden space-y-4">
                <input type="text" id="rName" required placeholder="Full Name" class="w-full input-field px-5 py-3.5 rounded-xl font-bold">
                <input type="email" id="rEmail" required placeholder="Email Address" class="w-full input-field px-5 py-3.5 rounded-xl font-bold">
                <input type="password" id="rPass" required placeholder="Password" class="w-full input-field px-5 py-3.5 rounded-xl font-bold">
                <input type="text" id="rRef" placeholder="Referral Code (Optional)" class="w-full input-field px-5 py-3.5 rounded-xl font-bold text-emerald-400">
                <button type="submit" id="btnReg" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-[0_0_20px_rgba(79,70,229,0.4)] transition-all active:scale-95 mt-2">Create Account</button>
            </form>

            <button onclick="location.href='/'" class="mt-8 text-slate-500 font-bold hover:text-white text-sm text-center transition-colors"><i class="fa-solid fa-arrow-left mr-2"></i> Back to Store</button>
        </div>
    </div>

    <script>
        const swalDark = { background: '#0f172a', color: '#fff', border: '1px solid #1e293b' };
        
        function switchTab(tab) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('regForm').classList.add('hidden');
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('tabReg').classList.remove('active');
            
            if(tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('tabLogin').classList.add('active');
            } else {
                document.getElementById('regForm').classList.remove('hidden');
                document.getElementById('tabReg').classList.add('active');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin'); btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            try {
                const res = await fetch('/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('lEmail').value, password: document.getElementById('lPass').value })
                });
                const data = await res.json();
                if(data.success) { localStorage.setItem('user', JSON.stringify(data.user)); window.location.href = '/'; } 
                else { Swal.fire({title: 'Failed', text: data.error, icon: 'error', ...swalDark}); }
            } catch(err) {
                Swal.fire({title: 'System Error', text: 'Database sync error. Admin needs to run npx prisma db push.', icon: 'error', ...swalDark});
            }
            btn.innerHTML = 'Sign In';
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('btnReg'); btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            try {
                const res = await fetch('/api/register', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: document.getElementById('rName').value, email: document.getElementById('rEmail').value, password: document.getElementById('rPass').value, refCode: document.getElementById('rRef').value, country: 'BD' })
                });
                const data = await res.json();
                if(data.success) { Swal.fire({title: 'Success!', text: data.message, icon: 'success', ...swalDark}).then(()=>switchTab('login')); } 
                else { Swal.fire({title: 'Failed', text: data.error, icon: 'error', ...swalDark}); }
            } catch(err) {
                Swal.fire({title: 'System Error', text: 'Database sync error. Admin needs to run npx prisma db push.', icon: 'error', ...swalDark});
            }
            btn.innerHTML = 'Create Account';
        }
    </script>
</body>
</html>
